name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create local.properties
        run: echo "flutter.sdk=$(dirname $(dirname $(which flutter)))" > android/local.properties

      - name: Generate launcher icons
        run: |
          sudo apt-get install -y imagemagick
          for size in 48 72 96 144 192; do
            case $size in
              48) folder="mipmap-mdpi";;
              72) folder="mipmap-hdpi";;
              96) folder="mipmap-xhdpi";;
              144) folder="mipmap-xxhdpi";;
              192) folder="mipmap-xxxhdpi";;
            esac
            mkdir -p android/app/src/main/res/$folder
            convert -size ${size}x${size} xc:#6366F1 android/app/src/main/res/$folder/ic_launcher.png
          done

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vyshu-studio-apk
          path: build/app/outputs/flutter-apk/app-release.apk
